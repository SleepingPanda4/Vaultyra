services:
  postgres:
    image: postgres:17-alpine
    container_name: vaultyra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vaultyra
      POSTGRES_USER: vaultyra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - vaultyra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultyra -d vaultyra"]
      interval: 5s
      timeout: 5s
      retries: 20

  vaultyra:
    build: .
    container_name: vaultyra
    restart: unless-stopped
    ports:
      - "12450:12450"
    environment:
      NODE_ENV: production
      PORT: 12450
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://vaultyra:${POSTGRES_PASSWORD}@postgres:5432/vaultyra
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:12450}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?Set DATA_ENCRYPTION_KEY in .env}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      PLAID_WEBHOOK_URL: ${PLAID_WEBHOOK_URL:-}
      PLAID_REDIRECT_URI: ${PLAID_REDIRECT_URI:-}
      PLAID_LINK_CUSTOMIZATION: ${PLAID_LINK_CUSTOMIZATION:-}
    depends_on:
      postgres:
        condition: service_healthy

  bank-sync:
    build: .
    container_name: vaultyra-bank-sync
    restart: unless-stopped
    command: ["sh", "-c", "pnpm migrate && while true; do pnpm sync:banks; sleep 86400; done"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://vaultyra:${POSTGRES_PASSWORD}@postgres:5432/vaultyra
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?Set DATA_ENCRYPTION_KEY in .env}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  vaultyra-postgres:
